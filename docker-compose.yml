version: "3.8"
services:
  tegrakobot:
    build: .
    container_name: tegrakobot
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "remnawave-panel:192.168.3.88"
    ports:
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - remnawave-network
      - internal
  db:
    image: postgres:17-alpine
    container_name: tegrakobot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tegrakobot
      POSTGRES_USER: tegrakobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - tegrakobot-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tegrakobot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
volumes:
  tegrakobot-db-data:
    name: tegrakobot-db-data
networks:
  remnawave-network:
    name: remnawave-network
    external: true
  internal:
    driver: bridge
